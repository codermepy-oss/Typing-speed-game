<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Typing Speed App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Typing Speed Trainer</h1>

    <div class="stats">
      <p>WPM: <span id="wpm">0</span></p>
      <p>Accuracy: <span id="accuracy">100%</span></p>
      <p>Streak: <span id="streak">0</span></p>
      <p>Time Left: <span id="timer">0</span>s</p>
    </div>

    <div class="sentence-box">
      <p id="sentence">Click Start to begin...</p>
    </div>

    <textarea 
      id="input" 
      placeholder="Start typing here..." 
      oninput="handleTyping()"
      disabled
    ></textarea>

    <div class="buttons">
      <button onclick="startApp(); enableTyping()">Start</button>
      <button onclick="restartApp()">Restart</button>
    </div>
  </div>

  <script src="script.js"></script>

  <script>
    function enableTyping() {
      document.getElementById("input").disabled = false;
      document.getElementById("input").focus();
    }
  </script>

</body>
</html>
