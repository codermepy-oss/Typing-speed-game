<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeMaster | Pro Typing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="bubble-container" id="bubbles"></div>

    <audio id="key-sound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_731385a430.mp3"></audio>
    <audio id="success-sound" src="https://cdn.pixabay.com/audio/2021/08/04/audio_0625c1539c.mp3"></audio>

    <nav class="glass-nav">
        <div class="logo-container">
            <span class="logo-text">TypeMaster</span>
            <span class="logo-bolt">⚡</span>
        </div>
        <button id="theme-toggle" class="theme-btn-styled">☀️ Light Mode</button>
    </nav>

    <main id="dashboard" class="page active">
        <section class="hero-container">
            <div class="glass-card hero-card">
                <span class="badge">Pro Typing Engine</span>
                <h1>Master Your Speed</h1>
                <p>High-precision tracking with real-time accuracy feedback.</p>
                <button class="btn-primary" onclick="navigateTo('practice')">Start Practice</button>
            </div>
        </section>
    </main>

    <main id="practice" class="page">
        <div class="practice-container">
            <div class="stats-grid">
                <div class="glass-card stat-tile"><span class="label">TIME</span><span id="timer" class="value">0</span></div>
                <div class="glass-card stat-tile"><span class="label">WPM</span><span id="wpm" class="value">0</span></div>
                <div class="glass-card stat-tile"><span class="label">ACCURACY</span><span id="accuracy" class="value">100</span><small>%</small></div>
            </div>
            <div class="glass-card main-typing-box">
                <div id="text-display" class="sentence-display"></div>
                <div class="input-wrapper">
                    <input type="text" id="typing-input" placeholder="Type here and press Enter to finish..." autocomplete="off">
                </div>
            </div>
            <button class="btn-ghost" onclick="navigateTo('dashboard')">Exit to Dashboard</button>
        </div>
    </main>

    <div id="modal-overlay" class="modal hidden">
        <div class="glass-card modal-box">
            <h2>🏆 Performance</h2>
            <div id="final-results" class="results-content"></div>
            <button class="btn-primary" onclick="resetTest()">Try Again</button>
            <button class="btn-primary btn-alt" onclick="navigateTo('dashboard')">Back to Dashboard</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
