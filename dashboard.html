<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dark">

<div class="container">

<h2 id="welcome"></h2>

<div class="card">
    <h3>🔥 Streak</h3>
    <p id="streak">0 days</p>
</div>

<div class="card">
    <h3>🎯 Daily Goal</h3>
    <select id="goal">
        <option value="5">5 sentences</option>
        <option value="10">10 sentences</option>
    </select>
    <button onclick="saveGoal()">Save</button>
</div>

<div class="card">
    <h3>💬 Motivation</h3>
    <p id="quote"></p>
</div>

<button class="main-btn" onclick="startPractice()">Start Practice</button>

</div>

<script src="script.js"></script>
</body>
</html>
