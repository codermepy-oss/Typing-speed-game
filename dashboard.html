<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="top-bar">
        <h2 id="welcome"></h2>
        <button onclick="toggleTheme()">🌗</button>
    </div>

    <div class="cards">

        <div class="card">
            <h3>🔥 Streak</h3>
            <p id="streak">0 days</p>
        </div>

        <div class="card">
            <h3>🎯 Goal</h3>
            <p id="goalDisplay"></p>
        </div>

        <div class="card">
            <h3>💡 Motivation</h3>
            <p id="quote"></p>
        </div>

    </div>

    <button class="start-btn" onclick="startPractice()">Start Today's Practice</button>

</div>

<script src="script.js"></script>
</body>
</html>
