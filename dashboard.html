<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <h2 id="welcome"></h2>
    <button onclick="toggleMode()">🌙</button>
</div>

<div class="dashboard">

    <div class="card">
        <h3>🔥 Streak</h3>
        <p id="streak">0</p>
    </div>

    <div class="card">
        <h3>🎯 Daily Goal</h3>
        <p id="goalDisplay"></p>
    </div>

    <div class="card">
        <h3>✨ Motivation</h3>
        <p id="quote"></p>
    </div>

    <button class="start-btn" onclick="startPractice()">Start Today's Practice</button>

</div>

<script src="script.js"></script>
</body>
</html>
